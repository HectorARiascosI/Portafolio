<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0020"/>
      <stop offset="50%" style="stop-color:#2d0035"/>
      <stop offset="100%" style="stop-color:#0d0010"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d78;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff2d78;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Fondo oscuro -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Glow circles -->
  <circle cx="200" cy="200" r="300" fill="#ff2d78" opacity="0.08" filter="url(#blur)"/>
  <circle cx="1000" cy="500" r="250" fill="#ff2d78" opacity="0.06" filter="url(#blur)"/>

  <!-- Navbar bar -->
  <rect width="1200" height="52" fill="#0d0010"/>
  <rect width="1200" height="2" y="52" fill="#ff2d78" opacity="0.6"/>

  <!-- Logo MileShop -->
  <rect x="24" y="12" width="28" height="28" rx="6" fill="#ff2d78"/>
  <text x="38" y="31" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle">M</text>
  <text x="80" y="33" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#ff2d78">MileShop</text>

  <!-- Nav links -->
  <text x="900" y="33" font-family="Arial, sans-serif" font-size="13" fill="#cccccc">🏠 INICIO</text>
  <text x="1010" y="33" font-family="Arial, sans-serif" font-size="13" fill="#cccccc">🛒 CARRITO</text>
  <text x="1110" y="33" font-family="Arial, sans-serif" font-size="13" fill="#ff2d78">→ SESIÓN</text>

  <!-- Hero banner -->
  <rect x="40" y="72" width="1120" height="420" rx="16" fill="#1a0025"/>
  <rect x="40" y="72" width="1120" height="420" rx="16" fill="url(#glow)"/>

  <!-- Banner content - gradient background like the real one -->
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c0"/>
      <stop offset="40%" style="stop-color:#d4edda"/>
      <stop offset="100%" style="stop-color:#b8d4b0"/>
    </linearGradient>
  </defs>
  <rect x="60" y="88" width="1080" height="380" rx="12" fill="url(#bannerBg)"/>

  <!-- Decorative circles on banner -->
  <circle cx="200" cy="200" r="120" fill="#a8d4a0" opacity="0.4"/>
  <circle cx="1000" cy="300" r="100" fill="#90c490" opacity="0.3"/>
  <circle cx="600" cy="100" r="80" fill="#b8e0b0" opacity="0.3"/>

  <!-- MileShop script text on banner -->
  <text x="600" y="260" font-family="Georgia, serif" font-size="88" font-weight="400" fill="#1a1a1a" text-anchor="middle" font-style="italic">MileShop</text>

  <!-- Banner subtitle -->
  <rect x="200" y="400" width="800" height="50" rx="4" fill="#1a1a1a" opacity="0.85"/>
  <text x="600" y="432" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">EXPLOSIÓN DE DESCUENTOS</text>
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">Abril MileShop · Nuevos productos a precios increíbles</text>

  <!-- Bottom label -->
  <rect x="0" y="620" width="1200" height="55" fill="#0d0010" opacity="0.9"/>
  <text x="600" y="653" font-family="Arial, sans-serif" font-size="14" fill="#ff2d78" text-anchor="middle" font-weight="600">E-Commerce · Django + Python · SQLite</text>
</svg>
